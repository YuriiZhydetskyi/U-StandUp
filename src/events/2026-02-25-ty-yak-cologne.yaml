description: |-
  Привіт, Кельн! Ми знову їдемо до вас з психологічно-розважальним ток-шоу «Ти як?», де двоє ведучих — психотерапевт і стендап-комік — дивляться на важливі теми з різних ракурсів.

  🎙 Олег Верба — психотерапевт, пропонує глибину та професійний погляд.
  😂 Віталій Абрамов — стендап-комік, додає легкості і здорової самоіронії.

  Про що будемо говорити:
  — стосунки та близькість
  — конфлікти та чи завжди можна домовитись у стосунках
  — еміграція і звідки брати ресурс переживати цей досвід
  — батьки та діти і чому нам буває так важко знайти спільну мову

  Можна буде поставити своє питання або обговорити те, що хвилює саме вас. Питання можна ставити анонімно — або відкрито. А можна просто прийти послухати.

  Атмосфера камерна та дружня — всі залишаються задоволеними 🤝

